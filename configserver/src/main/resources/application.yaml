spring:
  main:
    lazy-initialization: true
  application:
    name: configserver
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:/}
    connection-timeout: 30000
  profiles:
    active: native
  cloud:
    config:
      server:
        native:
          search-locations: file:///D:\Spring-Boot\ecom-microservices\configserver\src\main\resources\config

server:
  port: 8888

management:
  endpoints:
    web:
      exposure:
        include: "*"